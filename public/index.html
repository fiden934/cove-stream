<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COVE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0c0b0b;
  --bg2:#111010;
  --bg3:#181717;
  --bg4:#201f1f;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --text:#f0ede8;
  --sub:#8a8480;
  --dim:#3d3b38;
  --gold:#c8a44a;
  --gold2:#e8bc55;
  --gold3:#f5cc6a;
  --goldbg:rgba(200,164,74,0.08);
  --goldbdr:rgba(200,164,74,0.18);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:'Inter',sans-serif;border:none;}
img{display:block;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}

/* ── LAYOUT ── */
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── NAV ── */
nav{
  display:flex;align-items:center;gap:0;
  padding:0 32px;height:58px;flex-shrink:0;
  background:rgba(12,11,11,0.92);
  border-bottom:1px solid var(--border);
  position:relative;z-index:50;
  backdrop-filter:blur(12px);
}
.nav-logo{
  display:flex;align-items:center;gap:10px;
  margin-right:36px;
}
.nav-logo-icon{font-size:18px;filter:drop-shadow(0 0 10px rgba(200,164,74,0.5));}
.nav-logo-text{
  font-family:'Syne',sans-serif;font-size:18px;font-weight:800;
  letter-spacing:5px;color:var(--gold);
}

.nav-tabs{display:flex;gap:2px;}
.nav-tab{
  padding:7px 16px;border-radius:6px;
  font-size:13px;font-weight:500;color:var(--sub);
  background:none;transition:all 0.15s;
}
.nav-tab:hover{color:var(--text);background:rgba(255,255,255,0.05);}
.nav-tab.active{color:var(--gold);background:var(--goldbg);}

.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}

.search-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:24px;padding:7px 16px;
  width:220px;transition:width 0.3s,border-color 0.2s;
}
.search-pill:focus-within{border-color:var(--goldbdr);width:280px;}
.search-pill svg{width:14px;height:14px;stroke:var(--dim);flex-shrink:0;}
.search-pill input{
  background:none;border:none;outline:none;
  color:var(--text);font-size:13px;width:100%;
  caret-color:var(--gold);font-family:'Inter',sans-serif;
}
.search-pill input::placeholder{color:var(--dim);}

.type-chip{display:flex;gap:4px;background:var(--bg3);border-radius:20px;padding:3px;}
.chip-btn{
  padding:4px 12px;border-radius:16px;font-size:12px;font-weight:500;
  color:var(--sub);background:none;transition:all 0.15s;
}
.chip-btn.active{background:var(--gold);color:#120e00;font-weight:700;}

/* ── MAIN SCROLL ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;}

/* ── VIEWS ── */
.view{display:none;}
.view.on{display:block;}

/* ── FEATURED SECTION ── */
.featured{
  display:grid;grid-template-columns:1fr 1fr;
  min-height:420px;position:relative;overflow:hidden;
}
.featured-left{
  padding:48px 40px;display:flex;flex-direction:column;justify-content:flex-end;
  position:relative;z-index:2;background:var(--bg);
}
.featured-eyebrow{
  display:inline-flex;align-items:center;gap:7px;
  font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--gold);margin-bottom:16px;
  background:var(--goldbg);border:1px solid var(--goldbdr);
  padding:5px 12px;border-radius:100px;width:fit-content;
}
.featured-title{
  font-family:'Syne',sans-serif;
  font-size:clamp(28px,3.5vw,46px);font-weight:800;
  line-height:1.05;letter-spacing:-1px;
  color:var(--text);margin-bottom:12px;
}
.featured-meta{
  display:flex;align-items:center;gap:10px;
  flex-wrap:wrap;margin-bottom:14px;
}
.featured-rating{font-size:13px;font-weight:700;color:var(--gold);}
.featured-year{font-size:12px;color:var(--sub);}
.featured-genre{
  font-size:11px;color:var(--sub);
  background:var(--bg3);border:1px solid var(--border);
  padding:3px 9px;border-radius:100px;
}
.featured-overview{
  font-size:13px;color:var(--sub);line-height:1.7;
  margin-bottom:22px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  max-width:460px;
}
.featured-btns{display:flex;gap:10px;}

.btn-watch{
  display:flex;align-items:center;gap:8px;
  background:var(--gold);color:#120e00;
  border-radius:8px;padding:11px 22px;
  font-size:13px;font-weight:700;
  transition:background 0.15s,transform 0.1s;
}
.btn-watch:hover{background:var(--gold2);transform:translateY(-1px);}
.btn-watch svg{width:16px;height:16px;fill:#120e00;}

.btn-detail{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border2);color:var(--sub);
  border-radius:8px;padding:11px 18px;font-size:13px;font-weight:500;
  transition:all 0.15s;
}
.btn-detail:hover{color:var(--text);border-color:var(--border2);}

.featured-right{
  position:relative;overflow:hidden;
}
.featured-poster-wrap{
  position:absolute;inset:0;
  background:var(--bg2);
}
.featured-poster-img{
  width:100%;height:100%;object-fit:cover;
  transition:transform 8s ease, opacity 0.6s;
  opacity:0.85;
}
.featured-poster-grad{
  position:absolute;inset:0;
  background:linear-gradient(90deg, var(--bg) 0%, transparent 30%);
}

.featured-nav{
  position:absolute;bottom:24px;left:40px;
  display:flex;align-items:center;gap:10px;z-index:3;
}
.fn-dot{
  width:24px;height:3px;border-radius:2px;
  background:rgba(255,255,255,0.2);cursor:pointer;transition:all 0.25s;
}
.fn-dot.active{background:var(--gold);width:36px;}
.fn-arrows{display:flex;gap:6px;margin-left:8px;}
.fn-arrow{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,0.08);border:1px solid var(--border2);
  color:var(--sub);display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.fn-arrow:hover{background:var(--goldbg);border-color:var(--goldbdr);color:var(--gold);}
.fn-arrow svg{width:14px;height:14px;}

/* ── SECTION ── */
.section{padding:0 32px;margin-bottom:36px;}
.section:first-of-type{padding-top:32px;}

.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.section-title{
  font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.section-more{
  font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:var(--gold);opacity:0;transition:opacity 0.2s;cursor:pointer;
}
.section:hover .section-more{opacity:1;}

/* ── ROW ── */
.row-track{
  display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;
}
.row-track::-webkit-scrollbar{display:none;}

/* ── CARD ── */
.card{
  flex-shrink:0;width:148px;border-radius:10px;overflow:hidden;
  cursor:pointer;position:relative;background:var(--bg3);
  transition:transform 0.2s,box-shadow 0.2s;
}
.card:hover{transform:translateY(-4px) scale(1.02);z-index:2;box-shadow:0 12px 40px rgba(0,0,0,0.7),0 0 0 1px var(--goldbdr);}
.card-img{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--bg4);}
.card-info{
  position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(10,10,10,0.98) 0%,rgba(10,10,10,0.4) 45%,transparent 70%);
  opacity:0;transition:opacity 0.2s;
  display:flex;flex-direction:column;justify-content:flex-end;padding:10px;
}
.card:hover .card-info{opacity:1;}
.card-play-btn{
  width:34px;height:34px;border-radius:50%;
  background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:8px;transition:transform 0.15s;
  flex-shrink:0;
}
.card-play-btn:hover{transform:scale(1.12);}
.card-play-btn svg{width:13px;height:13px;fill:#120e00;margin-left:2px;}
.card-name{font-size:12px;font-weight:600;color:#fff;line-height:1.3;margin-bottom:3px;}
.card-sub{font-size:10px;color:var(--sub);display:flex;align-items:center;gap:5px;}
.card-stars{color:var(--gold);font-size:10px;font-weight:700;}

/* ── WIDE CARD (landscape) ── */
.wcard{
  flex-shrink:0;width:260px;border-radius:10px;overflow:hidden;
  cursor:pointer;position:relative;background:var(--bg3);
  transition:transform 0.2s,box-shadow 0.2s;
}
.wcard:hover{transform:translateY(-3px);box-shadow:0 10px 36px rgba(0,0,0,0.7),0 0 0 1px var(--goldbdr);}
.wcard-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--bg4);}
.wcard-body{padding:10px 12px 12px;}
.wcard-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wcard-meta{font-size:11px;color:var(--sub);display:flex;gap:8px;align-items:center;}
.wcard-rating{color:var(--gold);font-weight:700;}

/* ── SEARCH RESULTS ── */
.sr-head{padding:20px 0 16px;font-size:13px;color:var(--sub);}
.sr-head b{color:var(--text);}
.sr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}

/* ── DETAIL MODAL ── */
#modal{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;
  padding:24px;
}
#modal.on{display:flex;}
.modal-box{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:16px;overflow:hidden;
  width:100%;max-width:820px;max-height:88vh;
  display:flex;flex-direction:column;
  box-shadow:0 32px 80px rgba(0,0,0,0.9);
  animation:modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
.modal-backdrop{
  position:relative;height:220px;flex-shrink:0;
  background:var(--bg3) no-repeat center/cover;
}
.modal-backdrop-grad{
  position:absolute;inset:0;
  background:linear-gradient(0deg,var(--bg2) 0%,transparent 60%);
}
.modal-close{
  position:absolute;top:14px;right:14px;
  width:30px;height:30px;border-radius:50%;
  background:rgba(0,0,0,0.7);border:1px solid var(--border2);
  color:var(--sub);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;z-index:1;
}
.modal-close:hover{color:#fff;background:rgba(0,0,0,0.9);}
.modal-body{padding:0 28px 28px;overflow-y:auto;flex:1;}
.modal-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px;}
.modal-meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;align-items:center;}
.modal-rating{font-size:13px;font-weight:700;color:var(--gold);}
.modal-tag{font-size:11px;color:var(--sub);background:var(--bg4);border:1px solid var(--border);padding:3px 9px;border-radius:100px;}
.modal-overview{font-size:13px;color:var(--sub);line-height:1.75;margin-bottom:20px;max-width:660px;}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;}

.modal-seasons{margin-bottom:20px;}
.modal-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
.seasons-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.seasons-row::-webkit-scrollbar{display:none;}
.season-chip{
  flex-shrink:0;padding:7px 16px;border-radius:8px;
  background:var(--bg3);border:1px solid var(--border);
  font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;
  transition:all 0.15s;white-space:nowrap;
}
.season-chip:hover{border-color:var(--goldbdr);color:var(--gold);}
.season-chip.active{background:var(--goldbg);border-color:var(--goldbdr);color:var(--gold);}

.similar-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.similar-row::-webkit-scrollbar{display:none;}

/* ── PLAYER ── */
#player{
  position:fixed;inset:0;z-index:400;
  background:#000;display:none;flex-direction:column;
}
#player.on{display:flex;}
.player-nav{
  display:flex;align-items:center;gap:14px;
  padding:12px 24px;background:rgba(0,0,0,0.8);
  border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;
}
.player-back{
  display:flex;align-items:center;gap:7px;
  background:none;color:var(--sub);font-size:13px;font-weight:500;
  transition:color 0.15s;
}
.player-back:hover{color:#fff;}
.player-back svg{width:16px;height:16px;stroke:currentColor;fill:none;}
.player-titles{flex:1;}
.player-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#fff;}
.player-subtitle{font-size:11px;color:var(--sub);margin-top:1px;}

/* SOURCE SWITCHER */
.source-switcher{display:flex;gap:4px;align-items:center;}
.source-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-right:4px;}
.src-btn{
  padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;
  background:var(--bg3);border:1px solid var(--border);color:var(--sub);
  transition:all 0.15s;
}
.src-btn:hover{border-color:var(--goldbdr);color:var(--gold);}
.src-btn.active{background:var(--goldbg);border-color:var(--goldbdr);color:var(--gold);}

.player-body{flex:1;display:flex;overflow:hidden;min-height:0;}
.player-stage{flex:1;position:relative;background:#000;}
.player-stage iframe{position:absolute;inset:0;width:100%;height:100%;border:none;z-index:1;}

/* loading overlay */
.player-loader{
  position:absolute;inset:0;z-index:10;
  background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity 0.4s ease;
}
.player-loader.hide{opacity:0;pointer-events:none;}
.loader-ring{
  width:56px;height:56px;position:relative;
}
.loader-ring::before,.loader-ring::after{
  content:'';position:absolute;inset:0;border-radius:50%;
}
.loader-ring::before{border:2px solid rgba(200,164,74,0.12);}
.loader-ring::after{
  border:2px solid transparent;
  border-top-color:var(--gold);
  border-right-color:var(--gold2);
  animation:lspin 0.9s linear infinite;
}
@keyframes lspin{to{transform:rotate(360deg)}}
.loader-anchor{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:20px;animation:lpulse 2s ease-in-out infinite;
}
@keyframes lpulse{0%,100%{opacity:0.6}50%{opacity:1}}
.loader-text{font-size:13px;color:var(--sub);text-align:center;line-height:1.7;}
.loader-text span{color:var(--gold);font-weight:600;}
.loader-hint{
  font-size:11px;color:var(--dim);text-align:center;
  max-width:280px;line-height:1.6;
  padding:10px 16px;border-radius:8px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  opacity:0;transition:opacity 0.5s ease;
}
.loader-hint.show{opacity:1;}
.loader-try-btn{
  padding:8px 20px;border-radius:8px;
  background:var(--goldbg);border:1px solid var(--goldbdr);
  color:var(--gold);font-size:12px;font-weight:600;
  transition:all 0.15s;display:none;
}
.loader-try-btn:hover{background:rgba(200,164,74,0.15);}
.loader-try-btn.show{display:block;}

/* EPISODE PANEL */
.ep-panel{
  width:300px;flex-shrink:0;
  background:#0a0a0a;border-left:1px solid rgba(255,255,255,0.05);
  display:flex;flex-direction:column;
}
.ep-panel.hide{display:none;}
.ep-panel-head{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.05);}
.ep-panel-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:8px;}
.season-sel{
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);padding:7px 12px;
  font-size:12px;font-family:'Inter',sans-serif;outline:none;
}
.ep-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;}
.ep-item{
  display:flex;gap:10px;padding:10px 14px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.03);transition:background 0.15s;
  position:relative;
}
.ep-item:hover{background:rgba(255,255,255,0.04);}
.ep-item.on{background:rgba(200,164,74,0.07);}
.ep-bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);opacity:0;border-radius:0 2px 2px 0;}
.ep-item.on .ep-bar{opacity:1;}
.ep-still{width:80px;height:48px;border-radius:5px;object-fit:cover;background:var(--bg4);flex-shrink:0;}
.ep-info{flex:1;min-width:0;}
.ep-num{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:2px;}
.ep-name{font-size:11px;font-weight:600;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ep-dur{font-size:10px;color:var(--dim);margin-top:3px;}

/* ── SKELETON ── */
.sk{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:400%;animation:sk 1.4s infinite;}
@keyframes sk{0%{background-position:100%}100%{background-position:-100%}}
.sk-card{flex-shrink:0;width:148px;aspect-ratio:2/3;border-radius:10px;}
.sk-wcard{flex-shrink:0;width:260px;aspect-ratio:16/9;border-radius:10px;}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);
  z-index:999;background:var(--bg3);border:1px solid var(--border2);
  border-radius:24px;padding:10px 20px;font-size:13px;color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  opacity:0;transition:all 0.3s ease;pointer-events:none;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:768px){
  .featured{grid-template-columns:1fr;}
  .featured-right{display:none;}
  .section{padding:0 16px;}
  nav{padding:0 16px;}
  .ep-panel{display:none;}
}
</style>
</head>
<body>
<div id="toast"></div>

<!-- ─── PLAYER ─── -->
<div id="player">
  <div class="player-nav">
    <button class="player-back" onclick="closePlayer()">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <div class="player-titles">
      <div class="player-title" id="ptitle">—</div>
      <div class="player-subtitle" id="psubtitle"></div>
    </div>
    <div class="source-switcher">
      <span class="source-label">Source</span>
      <button class="src-btn active" onclick="setSource(0)">1</button>
      <button class="src-btn" onclick="setSource(1)">2</button>
      <button class="src-btn" onclick="setSource(2)">3</button>
      <button class="src-btn" onclick="setSource(3)">4</button>
    </div>
  </div>
  <div class="player-body">
    <div class="player-stage">
      <iframe id="pframe" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
      <div class="player-loader" id="ploading">
        <div class="loader-ring">
          <div class="loader-anchor">⚓</div>
        </div>
        <div class="loader-text">Loading from <span id="lsrc-name">Source 1</span>...</div>
        <div class="loader-hint" id="lhint">Some sources take 5–10 seconds to start.<br>If it stays black, try a different source.</div>
        <button class="loader-try-btn" id="ltry-btn" onclick="setSource((curSrc+1)%4)">Try Next Source →</button>
      </div>
    </div>
    <div class="ep-panel hide" id="ep-panel">
      <div class="ep-panel-head">
        <div class="ep-panel-label">Episodes</div>
        <select class="season-sel" id="sseason" onchange="changeSeason(this.value)"></select>
      </div>
      <div class="ep-scroll" id="ep-scroll"></div>
    </div>
  </div>
</div>

<!-- ─── DETAIL MODAL ─── -->
<div id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-backdrop" id="mbg">
      <div class="modal-backdrop-grad"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-title" id="mtitle">—</div>
      <div class="modal-meta" id="mmeta"></div>
      <div class="modal-overview" id="moverview"></div>
      <div class="modal-actions" id="mactions"></div>
      <div id="mseasons-wrap" style="display:none">
        <div class="modal-seasons">
          <div class="modal-label">Seasons</div>
          <div class="seasons-row" id="mseasons"></div>
        </div>
      </div>
      <div id="msimilar-wrap" style="display:none">
        <div class="modal-label" style="margin-bottom:10px">More Like This</div>
        <div class="similar-row" id="msimilar"></div>
      </div>
    </div>
  </div>
</div>

<!-- ─── SHELL ─── -->
<div class="shell">

  <!-- NAV -->
  <nav>
    <div class="nav-logo">
      <span class="nav-logo-icon">⚓</span>
      <span class="nav-logo-text">COVE</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-view="home" onclick="setView('home')">Discover</button>
      <button class="nav-tab" data-view="movies" onclick="setView('movies')">Movies</button>
      <button class="nav-tab" data-view="tv" onclick="setView('tv')">TV Shows</button>
    </div>
    <div class="nav-right">
      <div class="search-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="sq" type="text" placeholder="Search anything..." autocomplete="off" spellcheck="false">
      </div>
      <div class="type-chip">
        <button class="chip-btn active" data-type="multi" onclick="setType('multi')">All</button>
        <button class="chip-btn" data-type="movie" onclick="setType('movie')">Movies</button>
        <button class="chip-btn" data-type="tv" onclick="setType('tv')">Shows</button>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">

    <!-- HOME -->
    <div class="view on" id="home-view">
      <!-- FEATURED -->
      <div class="featured">
        <div class="featured-left">
          <div class="featured-eyebrow" id="feyebrow">⚡ Trending Now</div>
          <div class="featured-title" id="ftitle">Loading...</div>
          <div class="featured-meta" id="fmeta"></div>
          <div class="featured-overview" id="foverview"></div>
          <div class="featured-btns">
            <button class="btn-watch" id="fplay">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              Watch Now
            </button>
            <button class="btn-detail" id="finfo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              Details
            </button>
          </div>
        </div>
        <div class="featured-right">
          <div class="featured-poster-wrap">
            <img class="featured-poster-img" id="fposter" src="" alt="">
            <div class="featured-poster-grad"></div>
          </div>
        </div>
        <div class="featured-nav" id="fdots"></div>
      </div>
      <!-- HOME ROWS -->
      <div id="home-rows" style="padding-bottom:48px;"></div>
    </div>

    <!-- MOVIES -->
    <div class="view" id="movies-view">
      <div style="padding-top:28px;padding-bottom:48px;">
        <div class="section" id="sec-mtrend"></div>
        <div class="section" id="sec-mpop"></div>
        <div class="section" id="sec-mtop"></div>
        <div class="section" id="sec-mnow"></div>
      </div>
    </div>

    <!-- TV -->
    <div class="view" id="tv-view">
      <div style="padding-top:28px;padding-bottom:48px;">
        <div class="section" id="sec-ttrend"></div>
        <div class="section" id="sec-tpop"></div>
        <div class="section" id="sec-ttop"></div>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="view" id="search-view">
      <div class="section" style="padding-top:8px;padding-bottom:48px;">
        <div class="sr-head" id="sr-head"></div>
        <div class="sr-grid" id="sr-grid"></div>
      </div>
    </div>

  </div>
</div>

<script>
const API='/api';
let heroItems=[],heroIdx=0,heroTimer;
let curItem=null,curType='multi',curSrc=0;
let curSeason=1,curEp=1;
let sqTimer;

// embed sources
function embedMovie(id,src){
  const s=[
    `https://vidsrc.to/embed/movie/${id}`,
    `https://www.2embed.cc/embed/${id}`,
    `https://www.vidking.net/embed/movie/${id}?autoPlay=true`,
    `https://multiembed.mov/?video_id=${id}&tmdb=1`,
  ];
  return s[src]||s[0];
}
function embedTV(id,s,e,src){
  const srcs=[
    `https://vidsrc.to/embed/tv/${id}/${s}/${e}`,
    `https://www.2embed.cc/embedtv/${id}&s=${s}&e=${e}`,
    `https://www.vidking.net/embed/tv/${id}/${s}/${e}?autoPlay=true&nextEpisode=true&episodeSelector=true`,
    `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}`,
  ];
  return srcs[src]||srcs[0];
}

function toast(msg,ms=3000){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),ms);
}
async function api(path){
  const r=await fetch(API+path);
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
function sk(n=8,wide=false){
  return Array(n).fill(`<div class="${wide?'sk-wcard':'sk-card'} sk"></div>`).join('');
}

// ── VIEWS ──
function setView(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
  document.getElementById(v+'-view').classList.add('on');
  document.querySelector(`[data-view="${v}"]`)?.classList.add('active');
  document.getElementById('sq').value='';
  document.querySelector('.main').scrollTop=0;
  if(v==='movies') loadMovies();
  if(v==='tv') loadTV();
}
function setType(t){
  curType=t;
  document.querySelectorAll('.chip-btn').forEach(x=>x.classList.remove('active'));
  document.querySelector(`[data-type="${t}"]`)?.classList.add('active');
}

// ── CARDS ──
function makeCard(item,mt,wide=false){
  const type=mt||item.media_type||'movie';
  const title=item.title||item.name||'';
  const year=(item.release_date||item.first_air_date||'').slice(0,4);
  const rating=item.vote_average?.toFixed(1)||'—';
  const posterPath=item.poster_path;
  const backdropPath=item.backdrop_path;

  if(wide){
    const img=backdropPath?`https://image.tmdb.org/t/p/w500${backdropPath}`:
              posterPath?`https://image.tmdb.org/t/p/w500${posterPath}`:'';
    const d=document.createElement('div');
    d.className='wcard';
    d.innerHTML=`
      ${img?`<img class="wcard-img" src="${img}" loading="lazy" alt="">`:`<div class="wcard-img sk"></div>`}
      <div class="wcard-body">
        <div class="wcard-title">${title}</div>
        <div class="wcard-meta"><span class="wcard-rating">★ ${rating}</span><span>${year}</span><span>${type==='tv'?'Series':'Movie'}</span></div>
      </div>`;
    d.onclick=()=>openModal(item,type);
    return d;
  }

  const img=posterPath?`https://image.tmdb.org/t/p/w300${posterPath}`:'';
  const d=document.createElement('div');
  d.className='card';
  d.innerHTML=`
    ${img?`<img class="card-img" src="${img}" loading="lazy" alt="">`:`<div class="card-img sk" style="width:100%;aspect-ratio:2/3;"></div>`}
    <div class="card-info">
      <button class="card-play-btn" title="Watch"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <div class="card-name">${title}</div>
      <div class="card-sub"><span class="card-stars">★ ${rating}</span><span>${year}</span></div>
    </div>`;
  d.querySelector('.card-play-btn').onclick=e=>{e.stopPropagation();playItem(item,type);};
  d.onclick=()=>openModal(item,type);
  return d;
}

function renderRow(containerId,items,mt,wide=false){
  const el=document.getElementById(containerId);
  if(!el)return; el.innerHTML='';
  items.forEach(item=>el.appendChild(makeCard(item,mt,wide)));
}

function buildSection(containerId,title,items,mt,wide=false){
  const sec=document.getElementById(containerId);
  if(!sec)return;
  const trackId=containerId+'_track';
  sec.innerHTML=`
    <div class="section-head">
      <div class="section-title">${title}</div>
    </div>
    <div class="${wide?'row-track':'row-track'}" id="${trackId}">
      ${sk(wide?5:8,wide)}
    </div>`;
  const track=document.getElementById(trackId);
  track.innerHTML='';
  items.slice(0,wide?10:15).forEach(item=>track.appendChild(makeCard(item,mt,wide)));
}

// ── HERO ──
function renderHero(item){
  const type=item.media_type||'movie';
  const title=item.title||item.name||'';
  const rating=item.vote_average?.toFixed(1)||'';
  const year=(item.release_date||item.first_air_date||'').slice(0,4);
  const backdrop=item.backdrop_path?`https://image.tmdb.org/t/p/w1280${item.backdrop_path}`:'';
  const poster=item.poster_path?`https://image.tmdb.org/t/p/w780${item.poster_path}`:'';

  document.getElementById('ftitle').textContent=title;
  document.getElementById('foverview').textContent=item.overview||'';
  document.getElementById('feyebrow').textContent=type==='tv'?'📺 Trending Series':'🎬 Trending Film';
  document.getElementById('fmeta').innerHTML=`
    ${rating?`<span class="featured-rating">★ ${rating}</span>`:''}
    ${year?`<span class="featured-year">${year}</span>`:''}
    <span class="featured-genre">${type==='tv'?'Series':'Movie'}</span>
  `;

  const posterEl=document.getElementById('fposter');
  if(backdrop||poster){posterEl.src=backdrop||poster;}

  document.getElementById('fplay').onclick=()=>playItem(item,type);
  document.getElementById('finfo').onclick=()=>openModal(item,type);
}

function buildDots(){
  const el=document.getElementById('fdots');
  el.innerHTML=heroItems.map((_,i)=>`<div class="fn-dot${i===0?' active':''}" onclick="goHero(${i})"></div>`).join('')+
    `<div class="fn-arrows">
      <button class="fn-arrow" onclick="goHero((heroIdx-1+heroItems.length)%heroItems.length)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="fn-arrow" onclick="goHero((heroIdx+1)%heroItems.length)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>`;
}

function goHero(idx){
  heroIdx=idx;
  document.querySelectorAll('.fn-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  renderHero(heroItems[idx]);
}

function startRotation(){
  clearInterval(heroTimer);
  heroTimer=setInterval(()=>goHero((heroIdx+1)%heroItems.length),7000);
}

// ── HOME ──
async function loadHome(){
  try{
    const [tm,tt,pm,pt,top]=await Promise.all([
      api('/movie?action=trending'),
      api('/tv?action=trending'),
      api('/movie?action=popular'),
      api('/tv?action=popular'),
      api('/movie?action=top_rated'),
    ]);

    heroItems=[...(tm.results||[]).slice(0,4),...(tt.results||[]).slice(0,2)];
    if(heroItems.length){renderHero(heroItems[0]);buildDots();startRotation();}

    const rows=[
      {title:'🔥 Trending Movies',items:tm.results||[],mt:'movie'},
      {title:'📺 Trending Series',items:tt.results||[],mt:'tv',wide:true},
      {title:'Popular Movies',items:pm.results||[],mt:'movie'},
      {title:'Popular Shows',items:pt.results||[],mt:'tv'},
      {title:'🏆 Top Rated',items:top.results||[],mt:'movie',wide:true},
    ];

    const homeRows=document.getElementById('home-rows');
    homeRows.innerHTML='';
    rows.forEach((row,i)=>{
      const sec=document.createElement('div');
      sec.className='section';
      const trackId='hr_'+i;
      sec.innerHTML=`<div class="section-head"><div class="section-title">${row.title}</div></div><div class="row-track" id="${trackId}"></div>`;
      homeRows.appendChild(sec);
      const track=document.getElementById(trackId);
      (row.items).slice(0,row.wide?10:15).forEach(item=>track.appendChild(makeCard(item,row.mt,row.wide||false)));
    });
  }catch(e){toast('Failed to load content');}
}

async function loadMovies(){
  ['sec-mtrend','sec-mpop','sec-mtop','sec-mnow'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.innerHTML='<div class="row-track">'+sk()+'</div>';
  });
  try{
    const[a,b,c,d]=await Promise.all([
      api('/movie?action=trending'),
      api('/movie?action=popular'),
      api('/movie?action=top_rated'),
      api('/movie?action=nowplaying'),
    ]);
    buildSection('sec-mtrend','🔥 Trending',a.results||[],'movie');
    buildSection('sec-mpop','Popular Right Now',b.results||[],'movie',true);
    buildSection('sec-mtop','Top Rated All Time',c.results||[],'movie');
    buildSection('sec-mnow','Now Playing',d.results||[],'movie',true);
  }catch(e){toast('Failed to load movies');}
}

async function loadTV(){
  ['sec-ttrend','sec-tpop','sec-ttop'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.innerHTML='<div class="row-track">'+sk()+'</div>';
  });
  try{
    const[a,b,c]=await Promise.all([
      api('/tv?action=trending'),
      api('/tv?action=popular'),
      api('/tv?action=top_rated'),
    ]);
    buildSection('sec-ttrend','🔥 Trending Shows',a.results||[],'tv');
    buildSection('sec-tpop','Popular Series',b.results||[],'tv',true);
    buildSection('sec-ttop','Top Rated',c.results||[],'tv');
  }catch(e){toast('Failed to load shows');}
}

// ── SEARCH ──
document.getElementById('sq').addEventListener('input',function(){
  const q=this.value.trim();
  clearTimeout(sqTimer);
  if(!q){setView('home');return;}
  sqTimer=setTimeout(()=>doSearch(q),380);
});

async function doSearch(q){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  document.getElementById('search-view').classList.add('on');
  document.getElementById('sr-head').innerHTML=`Results for <b>"${q}"</b>`;
  const grid=document.getElementById('sr-grid');
  grid.innerHTML=sk(12);
  try{
    const type=curType==='multi'?'multi':curType;
    const data=await api(`/search?q=${encodeURIComponent(q)}&type=${type}`);
    grid.innerHTML='';
    (data.results||[]).filter(r=>r.media_type!=='person').forEach(item=>{
      grid.appendChild(makeCard(item,item.media_type||curType));
    });
    if(!grid.children.length) grid.innerHTML='<p style="color:var(--sub);font-size:13px;padding:8px 0">Nothing found.</p>';
  }catch(e){toast('Search failed');}
}

// ── MODAL ──
async function openModal(item,mt){
  const type=mt||item.media_type||'movie';
  curItem={...item,_mt:type};
  const m=document.getElementById('modal');
  m.classList.add('on'); document.body.style.overflow='hidden';

  // quick set
  const bd=item.backdrop_path?`https://image.tmdb.org/t/p/w1280${item.backdrop_path}`:'';
  if(bd) document.getElementById('mbg').style.backgroundImage=`url(${bd})`;
  document.getElementById('mtitle').textContent=item.title||item.name;
  document.getElementById('moverview').textContent=item.overview||'';
  document.getElementById('mmeta').innerHTML='';
  document.getElementById('mactions').innerHTML=`<button class="btn-watch" onclick="playItem(curItem,'${type}')"><svg viewBox="0 0 24 24" fill="#120e00" width="16" height="16"><path d="M8 5v14l11-7z"/></svg> Watch</button>`;
  document.getElementById('mseasons-wrap').style.display='none';
  document.getElementById('msimilar-wrap').style.display='none';

  try{
    const detail=type==='movie'
      ?await api(`/movie?id=${item.id}`)
      :await api(`/tv?id=${item.id}`);
    curItem={...detail,_mt:type};

    const rating=detail.vote_average?.toFixed(1);
    const year=(detail.release_date||detail.first_air_date||'').slice(0,4);
    const runtime=detail.runtime?`${detail.runtime} min`:detail.number_of_seasons?`${detail.number_of_seasons} season${detail.number_of_seasons>1?'s':''}`:null;
    const genres=(detail.genres||[]).map(g=>`<span class="modal-tag">${g.name}</span>`).join('');

    document.getElementById('mmeta').innerHTML=`
      ${rating?`<span class="modal-rating">★ ${rating}</span>`:''}
      ${year?`<span class="modal-tag">${year}</span>`:''}
      ${runtime?`<span class="modal-tag">${runtime}</span>`:''}
      <span class="modal-tag">${type==='tv'?'Series':'Movie'}</span>
      ${genres}
    `;
    document.getElementById('moverview').textContent=detail.overview||'';

    // seasons
    if(type==='tv'&&detail.seasons?.length){
      document.getElementById('mseasons-wrap').style.display='block';
      const sr=document.getElementById('mseasons');
      sr.innerHTML='';
      detail.seasons.forEach(s=>{
        const chip=document.createElement('div');
        chip.className='season-chip';
        chip.textContent=`Season ${s.season_number}`;
        chip.onclick=()=>playTV(curItem,s.season_number,1);
        sr.appendChild(chip);
      });
    }

    // similar
    if(detail.similar?.length){
      document.getElementById('msimilar-wrap').style.display='block';
      const sr=document.getElementById('msimilar');
      sr.innerHTML='';
      detail.similar.forEach(s=>sr.appendChild(makeCard(s,type)));
    }
  }catch(e){}
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('modal'))return;
  document.getElementById('modal').classList.remove('on');
  document.body.style.overflow='';
}

// ── PLAYER ──
let loaderTimer,slowTimer;
const SRC_NAMES=['VidSrc','2Embed','VidKing','MultiEmbed'];

function showLoader(srcIdx){
  const el=document.getElementById('ploading');
  const hint=document.getElementById('lhint');
  const tryBtn=document.getElementById('ltry-btn');
  document.getElementById('lsrc-name').textContent=SRC_NAMES[srcIdx]||('Source '+(srcIdx+1));
  el.classList.remove('hide');
  hint.classList.remove('show');
  tryBtn.classList.remove('show');
  clearTimeout(loaderTimer);
  clearTimeout(slowTimer);
  // after 6s show hint
  slowTimer=setTimeout(()=>{ hint.classList.add('show'); },6000);
  // after 12s show try-next button
  loaderTimer=setTimeout(()=>{ tryBtn.classList.add('show'); },12000);
}

function hideLoader(){
  document.getElementById('ploading').classList.add('hide');
  clearTimeout(loaderTimer);
  clearTimeout(slowTimer);
}

function setSource(idx){
  curSrc=idx;
  document.querySelectorAll('.src-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  if(!curItem)return;
  showLoader(idx);
  const mt=curItem._mt||curItem.media_type||'movie';
  const frame=document.getElementById('pframe');
  frame.src='';
  setTimeout(()=>{
    frame.src=mt==='tv'
      ?embedTV(curItem.id,curSeason,curEp,idx)
      :embedMovie(curItem.id,idx);
  },80);
}

// hide loader when iframe fires load
document.getElementById('pframe').addEventListener('load',function(){
  if(this.src) setTimeout(hideLoader, 800);
});

async function playItem(item,mt){
  const type=mt||item._mt||item.media_type||'movie';
  if(type==='tv') await playTV(item,1,1);
  else playMovie(item);
}

function playMovie(item){
  curItem={...item,_mt:'movie'};curSrc=0;curSeason=1;curEp=1;
  document.getElementById('ptitle').textContent=item.title||item.name;
  document.getElementById('psubtitle').textContent='';
  document.getElementById('ep-panel').classList.add('hide');
  document.querySelectorAll('.src-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.getElementById('player').classList.add('on');
  document.getElementById('modal').classList.remove('on');
  document.body.style.overflow='hidden';
  showLoader(0);
  setTimeout(()=>{ document.getElementById('pframe').src=embedMovie(item.id,0); },80);
}

async function playTV(show,season,ep){
  curItem={...show,_mt:'tv'};curSrc=0;curSeason=season;curEp=ep;
  document.getElementById('ptitle').textContent=show.title||show.name;
  document.getElementById('psubtitle').textContent=`Season ${season} · Episode ${ep}`;
  document.getElementById('ep-panel').classList.remove('hide');
  document.querySelectorAll('.src-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.getElementById('player').classList.add('on');
  document.getElementById('modal').classList.remove('on');
  document.body.style.overflow='hidden';
  showLoader(0);
  setTimeout(()=>{ document.getElementById('pframe').src=embedTV(show.id,season,ep,0); },80);
  await buildEpPanel(show);
}

async function buildEpPanel(show){
  const sel=document.getElementById('sseason');
  sel.innerHTML='';
  const seasons=(show.seasons||[]).filter(s=>s.season_number>0);
  if(!seasons.length){
    try{
      const d=await api(`/tv?id=${show.id}`);
      (d.seasons||[]).filter(s=>s.season_number>0).forEach(s=>{
        sel.appendChild(Object.assign(document.createElement('option'),{value:s.season_number,textContent:`Season ${s.season_number}`}));
      });
    }catch(e){}
  } else {
    seasons.forEach(s=>sel.appendChild(Object.assign(document.createElement('option'),{value:s.season_number,textContent:`Season ${s.season_number}`})));
  }
  sel.value=curSeason;
  await loadEpList(show.id,curSeason,curEp);
}

async function changeSeason(s){
  curSeason=parseInt(s);curEp=1;
  showLoader(curSrc);
  setTimeout(()=>{ document.getElementById('pframe').src=embedTV(curItem.id,curSeason,1,curSrc); },80);
  document.getElementById('psubtitle').textContent=`Season ${curSeason} · Episode 1`;
  await loadEpList(curItem.id,curSeason,1);
}

async function loadEpList(showId,season,activeEp){
  const scroll=document.getElementById('ep-scroll');
  scroll.innerHTML='<div style="padding:14px 16px;font-size:12px;color:var(--dim)">Loading...</div>';
  try{
    const d=await api(`/tv?id=${showId}&season=${season}`);
    scroll.innerHTML='';
    (d.episodes||[]).forEach(ep=>{
      const div=document.createElement('div');
      div.className='ep-item'+(ep.episode_number===activeEp?' on':'');
      const still=ep.still_path?`https://image.tmdb.org/t/p/w300${ep.still_path}`:'';
      div.innerHTML=`<div class="ep-bar"></div>
        ${still?`<img class="ep-still" src="${still}" loading="lazy">`:`<div class="ep-still sk"></div>`}
        <div class="ep-info">
          <div class="ep-num">E${ep.episode_number}</div>
          <div class="ep-name">${ep.name}</div>
          ${ep.runtime?`<div class="ep-dur">${ep.runtime}m</div>`:''}
        </div>`;
      div.onclick=()=>{
        curEp=ep.episode_number;
        document.querySelectorAll('.ep-item').forEach(x=>x.classList.remove('on'));
        div.classList.add('on');
        showLoader(curSrc);
        setTimeout(()=>{ document.getElementById('pframe').src=embedTV(showId,season,ep.episode_number,curSrc); },80);
        document.getElementById('psubtitle').textContent=`Season ${season} · Episode ${ep.episode_number}`;
      };
      scroll.appendChild(div);
    });
    scroll.querySelector('.ep-item.on')?.scrollIntoView({block:'center',behavior:'smooth'});
  }catch(e){scroll.innerHTML='<div style="padding:14px;color:var(--dim);font-size:12px">Failed.</div>';}
}

function closePlayer(){
  document.getElementById('player').classList.remove('on');
  document.getElementById('pframe').src='';
  clearTimeout(loaderTimer);clearTimeout(slowTimer);
  document.getElementById('ploading').classList.remove('hide');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('player').classList.contains('on'))closePlayer();
    else closeModal();
  }
});

// ── INIT ──
loadHome();
</script>
</body>
</html>
